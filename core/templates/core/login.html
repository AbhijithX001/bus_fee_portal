{% extends "core/base.html" %}
{% block title %}Login — BusTrack Pro{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center auth-wrap py-5">
  <div class="card auth-card p-4 p-lg-5">
    <p class="text-uppercase small fw-semibold text-primary mb-2">Welcome Back</p>
    <h3 class="mb-3 fw-semibold">Sign In to BusTrack Pro</h3>
    <p class="text-muted mb-4">Use your account credentials to access student or admin tools.</p>

    {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-2">Continue</button>
    </form>
  </div>
</div>
{% endblock %}
