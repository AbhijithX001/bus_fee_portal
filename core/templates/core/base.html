{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}BusTrack Pro{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    :root {
      --brand-900: #0e2a43;
      --brand-700: #1a4f7a;
      --brand-500: #2f7fb6;
      --accent-500: #ff8a3d;
      --accent-600: #ef6f24;
      --surface: #ffffff;
      --surface-soft: #f5f9fc;
      --border: #d7e3ee;
      --text-900: #172535;
      --text-700: #42596f;
      --text-500: #6f8194;
      --shadow-soft: 0 10px 30px rgba(13, 45, 72, 0.08);
      --shadow-lift: 0 16px 38px rgba(13, 45, 72, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--text-900);
      background:
        radial-gradient(circle at 3% 0%, #d8edf9 0%, transparent 30%),
        radial-gradient(circle at 98% 7%, #ffe8d9 0%, transparent 25%),
        linear-gradient(180deg, #f8fcff 0%, #eef5fb 100%);
      min-height: 100vh;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .navbar-brand {
      font-family: "Space Grotesk", "Manrope", sans-serif;
      letter-spacing: -0.02em;
    }

    .main-navbar {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(26, 79, 122, 0.14);
      box-shadow: 0 6px 24px rgba(11, 41, 66, 0.08);
    }

    .main-navbar .navbar-brand {
      color: var(--brand-900);
      font-weight: 700;
    }

    .main-navbar .navbar-brand:hover {
      color: var(--brand-700);
    }

    .page-shell {
      padding-bottom: 2rem;
    }

    .card {
      border-radius: 1rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-soft);
      background-color: var(--surface);
    }

    .card-header {
      background: linear-gradient(90deg, #f4f9fc 0%, #edf5fb 100%);
      border-bottom: 1px solid var(--border);
      color: var(--brand-900);
      font-weight: 700;
    }

    .table {
      color: var(--text-900);
    }

    .table > :not(caption) > * > * {
      border-bottom-color: #e3ecf3;
      padding: 0.9rem 1rem;
    }

    .table thead th {
      color: var(--brand-900);
      font-weight: 700;
      background: #f1f7fc;
      border-bottom-width: 1px;
    }

    .btn {
      font-weight: 700;
      border-radius: 0.75rem;
      padding: 0.5rem 1rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--brand-700), var(--brand-500));
      border: none;
      box-shadow: 0 9px 18px rgba(40, 105, 154, 0.22);
    }

    .btn-primary:hover,
    .btn-primary:focus {
      background: linear-gradient(135deg, #164669, #2970a0);
      box-shadow: 0 11px 20px rgba(31, 89, 131, 0.28);
    }

    .btn-outline-primary {
      border-color: var(--brand-500);
      color: var(--brand-700);
    }

    .btn-outline-primary:hover {
      color: #fff;
      background-color: var(--brand-500);
    }

    .btn-light {
      background-color: #f4f8fb;
      border-color: #d8e6f1;
      color: var(--text-700);
    }

    .form-control,
    .form-select {
      border-radius: 0.7rem;
      border-color: #c9d8e6;
      padding: 0.62rem 0.85rem;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--brand-500);
      box-shadow: 0 0 0 0.22rem rgba(47, 127, 182, 0.16);
    }

    form p {
      margin-bottom: 1rem;
    }

    form p label {
      display: block;
      margin-bottom: 0.45rem;
      font-weight: 700;
      color: var(--text-700);
    }

    form p input,
    form p select,
    form p textarea {
      width: 100%;
      border: 1px solid #c9d8e6;
      border-radius: 0.7rem;
      padding: 0.62rem 0.85rem;
    }

    form p input:focus,
    form p select:focus,
    form p textarea:focus {
      outline: none;
      border-color: var(--brand-500);
      box-shadow: 0 0 0 0.22rem rgba(47, 127, 182, 0.16);
    }

    .dashboard-stat {
      background: linear-gradient(135deg, #edf6fd 0%, #f5f9fc 100%);
      border: 1px solid var(--border);
      border-radius: 0.9rem;
      padding: 0.9rem;
    }

    .status-paid,
    .status-pending,
    .status-unpaid {
      font-weight: 700;
      border-radius: 999px;
      font-size: 0.78rem;
      display: inline-block;
      padding: 0.3rem 0.7rem;
    }

    .status-paid {
      color: #0a7b40;
      background: #e5f6ee;
    }

    .status-pending {
      color: #975f00;
      background: #fff2da;
    }

    .status-unpaid {
      color: #9f1f25;
      background: #fce4e6;
    }

    .auth-wrap {
      min-height: 70vh;
    }

    .auth-card {
      max-width: 430px;
      width: 100%;
      border: 1px solid #cde0ee;
      box-shadow: var(--shadow-lift);
    }

    @media (max-width: 768px) {
      .page-shell {
        padding-left: 0.9rem;
        padding-right: 0.9rem;
      }

      .table > :not(caption) > * > * {
        padding: 0.75rem 0.65rem;
        font-size: 0.92rem;
      }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>

<body>
  <nav class="navbar navbar-expand-lg main-navbar mb-4">
    <div class="container">
      <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="{% url 'landing' %}">
        <i class="bi bi-bus-front-fill"></i>
        <span>BusTrack Pro</span>
      </a>
      <div>
        {% if request.user.is_authenticated %}
          <a href="{% url 'logout' %}" class="btn btn-outline-danger">
            Logout
          </a>
        {% else %}
          <a href="{% url 'login' %}" class="btn btn-primary">
            Login
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container page-shell mb-5">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
